services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-28686}:16686"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:16686 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_workspace}
      MYSQL_USER: ${MYSQL_USER:-chat_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chat_app}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

  migrate:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/migrate:${IMAGE_TAG:-latest}
    environment: &service_env
      MYSQL_DSN: ${MYSQL_USER:-chat_app}:${MYSQL_PASSWORD:-chat_app}@tcp(mysql:3306)/${MYSQL_DATABASE:-chat_workspace}
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: ${RABBITMQ_URL:-redis://redis:6379}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-mock://mysql}
      JWT_SECRET: ${JWT_SECRET:-compose-secret-change-me}
      CORS_ORIGINS: http://127.0.0.1:${FRONTEND_PORT:-25173},http://localhost:${FRONTEND_PORT:-25173}
      OTEL_EXPORTER: ${OTEL_EXPORTER:-otlp}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    depends_on:
      mysql:
        condition: service_healthy
    command: ["service"]

  auth-service:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/auth-service:${IMAGE_TAG:-latest}
    environment:
      <<: *service_env
      APP_PORT: "8081"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-28081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  api-service:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/api-service:${IMAGE_TAG:-latest}
    environment:
      <<: *service_env
      APP_PORT: "8082"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - "${API_PORT:-28082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/api/v1/system/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  realtime-service:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/realtime-service:${IMAGE_TAG:-latest}
    environment:
      <<: *service_env
      APP_PORT: "8083"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - "${REALTIME_PORT:-28083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/frontend:${IMAGE_TAG:-latest}
    environment:
      NEXT_PUBLIC_AUTH_BASE_URL: http://127.0.0.1:${AUTH_PORT:-28081}
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${API_PORT:-28082}
      NEXT_PUBLIC_REALTIME_BASE_URL: ws://127.0.0.1:${REALTIME_PORT:-28083}
    depends_on:
      auth-service:
        condition: service_healthy
      api-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-25173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  mysql-data:
  redis-data:
