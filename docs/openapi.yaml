openapi: 3.0.3
info:
  title: Chat API
  version: "1"
  description: |
    success: {code:0,message:"ok",data:<schema>}
    error: {code:http_status,message,error_code}
servers:
  - { url: 'http://127.0.0.1:8081' }
  - { url: 'http://127.0.0.1:8082' }
  - { url: 'http://127.0.0.1:8083' }
  - { url: 'http://127.0.0.1:28081' }
  - { url: 'http://127.0.0.1:28082' }
  - { url: 'http://127.0.0.1:28083' }

components:
  securitySchemes:
    BearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  schemas:
    Err:
      type: object
      required: [code, message]
      properties:
        code: { type: integer }
        message: { type: string }
        error_code: { type: string }

    Status:
      type: object
      properties:
        status: { type: string }

    U:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }

    F:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
        remark_name: { type: string }
        is_ai_bot: { type: boolean }

    AdminProfile:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        must_change_password: { type: boolean }

    AdminAuth:
      type: object
      properties:
        access_token: { type: string }
        admin: { $ref: '#/components/schemas/AdminProfile' }

    AdminLogin:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AdminPwd:
      type: object
      required: [password]
      properties:
        password: { type: string }

    AIProvider:
      type: object
      properties:
        enabled: { type: boolean }
        api_key: { type: string }
        base_url: { type: string }
        models:
          type: array
          items: { type: string }

    AIConfig:
      type: object
      properties:
        bot:
          type: object
          properties:
            enabled: { type: boolean }
            username: { type: string }
            display_name: { type: string }
            system_prompt: { type: string }
            default_provider: { type: string }
            default_model: { type: string }
            context_messages: { type: integer }
            async_timeout_seconds: { type: integer }
        providers:
          type: object
          properties:
            zhipu: { $ref: '#/components/schemas/AIProvider' }
            openai: { $ref: '#/components/schemas/AIProvider' }
            anthropic: { $ref: '#/components/schemas/AIProvider' }
        audit:
          type: object
          properties:
            enabled: { type: boolean }
            retention_days: { type: integer }

    MonitorSvc:
      type: object
      properties:
        name: { type: string }
        healthy: { type: boolean }
        status: { type: string }
        error: { type: string }
        checked_at: { type: string }

    MonitorOverview:
      type: object
      properties:
        services:
          type: array
          items: { $ref: '#/components/schemas/MonitorSvc' }
        total_requests: { type: number }
        client_errors: { type: number }
        server_errors: { type: number }
        average_latency_ms: { type: number }
        websocket_connections: { type: number }
        ai_retry_pending: { type: number }
        ai_retry_completed: { type: number }
        ai_retry_exhausted: { type: number }
        snapshot_at: { type: string }

    MonitorPoint:
      type: object
      properties:
        timestamp: { type: string }
        total_requests: { type: number }
        client_errors: { type: number }
        server_errors: { type: number }
        average_latency_ms: { type: number }
        websocket_connections: { type: number }
        ai_retry_pending: { type: number }
        ai_retry_completed: { type: number }
        ai_retry_exhausted: { type: number }

    MonitorTimeseries:
      type: object
      properties:
        points:
          type: array
          items: { $ref: '#/components/schemas/MonitorPoint' }

    AIAudit:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        request_id: { type: string }
        provider: { type: string }
        model: { type: string }
        status: { type: string }
        duration_ms: { type: integer }
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        total_tokens: { type: integer }
        input_preview: { type: string }
        output_preview: { type: string }
        error_code: { type: string }
        error_message: { type: string }
        created_at: { type: string }

    AIAuditDetail:
      allOf:
        - { $ref: '#/components/schemas/AIAudit' }
        - type: object
          properties:
            request_payload_json: { type: string }
            response_payload_json: { type: string }

    AIRetryJob:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        status: { type: string }
        attempt_count: { type: integer }
        next_attempt_at: { type: string }
        last_error: { type: string }
        created_at: { type: string }
        updated_at: { type: string }

    MessageLookup:
      type: object
      properties:
        message_id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        sender_id: { type: integer, format: int64 }
        client_msg_id: { type: string }

    JourneyStage:
      type: object
      properties:
        name: { type: string }
        occurred_at: { type: string }
        recipient_id: { type: integer, format: int64 }
        note: { type: string }

    MessageJourney:
      type: object
      properties:
        message_id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        client_msg_id: { type: string }
        sender_id: { type: integer, format: int64 }
        message_type: { type: string }
        delivery_status: { type: string }
        created_at: { type: string }
        recalled_at: { type: string }
        stages:
          type: array
          items: { $ref: '#/components/schemas/JourneyStage' }

    ConsistencyMember:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        last_read_seq: { type: integer, format: int64 }
        unread_count: { type: integer }
        current_cursor: { type: integer, format: int64 }
        online: { type: boolean }

    Consistency:
      type: object
      properties:
        conversation_id: { type: integer, format: int64 }
        last_message_seq: { type: integer, format: int64 }
        last_message_at: { type: string }
        online_count: { type: integer }
        current_event_lag: { type: integer, format: int64 }
        members:
          type: array
          items: { $ref: '#/components/schemas/ConsistencyMember' }

    A:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user: { $ref: '#/components/schemas/U' }

    S:
      type: object
      properties:
        id: { type: string }
        device_id: { type: string }
        user_agent: { type: string }
        last_seen_at: { type: string }
        expires_at: { type: string }
        current: { type: boolean }

    FR:
      type: object
      properties:
        id: { type: integer, format: int64 }
        status: { type: string }
        direction: { type: string }
        message: { type: string }
        requester: { $ref: '#/components/schemas/U' }
        addressee: { $ref: '#/components/schemas/U' }
        created_at: { type: string }
        updated_at: { type: string }

    C:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { type: string }
        name: { type: string }
        announcement: { type: string }
        creator_id: { type: integer, format: int64 }
        member_count: { type: integer }
        pinned: { type: boolean }
        pinned_at: { type: string }
        is_muted: { type: boolean }
        draft: { type: string }
        last_read_seq: { type: integer, format: int64 }
        unread_count: { type: integer }
        last_message_seq: { type: integer, format: int64 }
        last_message_sender: { type: integer, format: int64 }
        last_message_preview: { type: string }
        last_message_type: { type: string }
        last_message_at: { type: string }

    CM:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
        remark_name: { type: string }
        role: { type: string }
        last_read_seq: { type: integer, format: int64 }
        joined_at: { type: string }
        online: { type: boolean }

    M:
      type: object
      properties:
        id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        seq: { type: integer, format: int64 }
        sender_id: { type: integer, format: int64 }
        message_type: { type: string }
        content: { type: string }
        reply_to_message_id: { type: integer, format: int64 }
        reply_to: { $ref: '#/components/schemas/MRRef' }
        attachment: { $ref: '#/components/schemas/Att' }
        client_msg_id: { type: string }
        status: { type: string }
        delivery_status: { type: string }
        recalled_at: { type: string }
        created_at: { type: string }

    Att:
      type: object
      properties:
        object_key: { type: string }
        url: { type: string }
        filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }

    MRRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        sender_id: { type: integer, format: int64 }
        message_type: { type: string }
        content: { type: string }
        attachment: { $ref: '#/components/schemas/Att' }
        recalled_at: { type: string }

    SH:
      type: object
      properties:
        conversation_id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        updated_at: { type: string }

    SM:
      type: object
      properties:
        message_id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        conversation_name: { type: string }
        sender_id: { type: integer, format: int64 }
        message_type: { type: string }
        content: { type: string }
        created_at: { type: string }

    SR:
      type: object
      properties:
        conversations:
          type: array
          items: { $ref: '#/components/schemas/SH' }
        messages:
          type: array
          items: { $ref: '#/components/schemas/SM' }
        next_cursor: { type: string }

    SC:
      type: object
      properties:
        cursor: { type: integer, format: int64 }

    SE:
      type: object
      properties:
        event_id: { type: integer, format: int64 }
        event_type: { type: string }
        aggregate_id: { type: string }
        cursor: { type: integer, format: int64 }
        type: { type: string }
        payload: { type: object, additionalProperties: true }
        created_at: { type: string }

    SER:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/SE' }
        next_cursor: { type: integer, format: int64 }
        current_cursor: { type: integer, format: int64 }
        has_more: { type: boolean }

    Ready:
      type: object
      properties:
        service: { type: object, additionalProperties: true }
        database: { type: object, additionalProperties: true }
        redis: { type: object, additionalProperties: true }
        rabbitmq: { type: object, additionalProperties: true }
        elasticsearch: { type: object, additionalProperties: true }

    Reg:
      type: object
      required: [username, display_name, password]
      properties:
        username: { type: string }
        display_name: { type: string }
        password: { type: string }

    Log:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    Ref:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    Lo:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    UP:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        avatar_url: { type: string }

    CFR:
      type: object
      required: [addressee_id]
      properties:
        addressee_id: { type: integer, format: int64 }
        message: { type: string }

    UFR:
      type: object
      properties:
        remark_name: { type: string }

    CDC:
      type: object
      required: [target_user_id]
      properties:
        target_user_id: { type: integer, format: int64 }

    CGC:
      type: object
      required: [name, member_ids]
      properties:
        name: { type: string }
        member_ids:
          type: array
          items: { type: integer, format: int64 }

    RC:
      type: object
      required: [name]
      properties:
        name: { type: string }

    ACM:
      type: object
      required: [member_ids]
      properties:
        member_ids:
          type: array
          items: { type: integer, format: int64 }

    TO:
      type: object
      required: [user_id]
      properties:
        user_id: { type: integer, format: int64 }

    UCS:
      type: object
      properties:
        pinned: { type: boolean }
        is_muted: { type: boolean }
        draft: { type: string }
        announcement: { type: string }

    MSG:
      type: object
      required: [content]
      properties:
        message_type: { type: string }
        content: { type: string }
        client_msg_id: { type: string }
        reply_to_message_id: { type: integer, format: int64 }
        attachment: { $ref: '#/components/schemas/Att' }

    MR:
      type: object
      properties:
        seq: { type: integer, format: int64 }

    Typing:
      type: object
      required: [is_typing]
      properties:
        is_typing: { type: boolean }

    UPR:
      type: object
      required: [filename, content_type, size_bytes]
      properties:
        filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }

    UPS:
      type: object
      properties:
        object_key: { type: string }
        upload_path: { type: string }
        method: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        public_url: { type: string }

    UCR:
      type: object
      required: [object_key, filename, content_type, size_bytes]
      properties:
        object_key: { type: string }
        filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }

    UCSP:
      type: object
      properties:
        attachment: { $ref: '#/components/schemas/Att' }

    E_auth_ok:
      type: object
      properties:
        type: { type: string, enum: [auth.ok] }
        payload:
          type: object
          properties:
            user_id: { type: integer, format: int64 }
            session_id: { type: string }

    E_msg_new:
      type: object
      properties:
        type: { type: string, enum: [message.persisted] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            message: { $ref: '#/components/schemas/M' }
            conversation: { $ref: '#/components/schemas/C' }

    E_msg_accepted:
      type: object
      properties:
        type: { type: string, enum: [message.accepted] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            client_msg_id: { type: string }
            accepted_at: { type: string }

    E_msg_delivered:
      type: object
      properties:
        type: { type: string, enum: [message.delivered] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            message_id: { type: integer, format: int64 }
            client_msg_id: { type: string }
            delivery_status: { type: string }
            updated_at: { type: string }

    E_read:
      type: object
      properties:
        type: { type: string, enum: [message.read] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            reader_id: { type: integer, format: int64 }
            last_read_seq: { type: integer, format: int64 }

    E_recalled:
      type: object
      properties:
        type: { type: string, enum: [message.recalled] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            message_id: { type: integer, format: int64 }
            recalled_at: { type: string }

    E_typing:
      type: object
      properties:
        type: { type: string, enum: [typing.updated] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            conversation_id: { type: integer, format: int64 }
            user_id: { type: integer, format: int64 }
            is_typing: { type: boolean }

    E_fr:
      type: object
      properties:
        type: { type: string, enum: [friend.request] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }
            request: { $ref: '#/components/schemas/FR' }

    E_sync:
      type: object
      properties:
        type: { type: string, enum: [sync.notify] }
        payload:
          type: object
          properties:
            recipients:
              type: array
              items: { type: integer, format: int64 }

    Event:
      oneOf:
        - { $ref: '#/components/schemas/E_auth_ok' }
        - { $ref: '#/components/schemas/E_msg_accepted' }
        - { $ref: '#/components/schemas/E_msg_new' }
        - { $ref: '#/components/schemas/E_msg_delivered' }
        - { $ref: '#/components/schemas/E_recalled' }
        - { $ref: '#/components/schemas/E_typing' }
        - { $ref: '#/components/schemas/E_read' }
        - { $ref: '#/components/schemas/E_fr' }
        - { $ref: '#/components/schemas/E_sync' }

paths:
  /api/v1/system/ready:
    get:
      responses:
        '200':
          description: data=Ready
          content: { application/json: { schema: { $ref: '#/components/schemas/Ready' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/register:
    post:
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Reg' } } }
      responses:
        '200':
          description: data=U
          content: { application/json: { schema: { $ref: '#/components/schemas/U' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/login:
    post:
      security: []
      parameters:
        - in: header
          name: X-Device-Id
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Log' } } }
      responses:
        '200':
          description: data=A
          content: { application/json: { schema: { $ref: '#/components/schemas/A' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/refresh:
    post:
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Ref' } } }
      responses:
        '200':
          description: data=A
          content: { application/json: { schema: { $ref: '#/components/schemas/A' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/sessions:
    get:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=S[]
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/S' }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/logout:
    post:
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Lo' } } }
      responses:
        '200':
          description: data=Status
          content: { application/json: { schema: { $ref: '#/components/schemas/Status' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/logout-all:
    post:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=Status
          content: { application/json: { schema: { $ref: '#/components/schemas/Status' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/auth/logout-others:
    post:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=Status
          content: { application/json: { schema: { $ref: '#/components/schemas/Status' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/users/me:
    get:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=U
          content: { application/json: { schema: { $ref: '#/components/schemas/U' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }
    patch:
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UP' } } }
      responses:
        '200':
          description: data=U
          content: { application/json: { schema: { $ref: '#/components/schemas/U' } } }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/users:
    get:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=U[]
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/U' }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/friends:
    get:
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: data=F[]
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/F' }
        default:
          description: error
          content: { application/json: { schema: { $ref: '#/components/schemas/Err' } } }

  /api/v1/friends/{id}/remark:
    patch:
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
